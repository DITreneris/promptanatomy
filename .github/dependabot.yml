# Dependabot: automatiniai dependency update PR
# https://docs.github.com/en/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Atnaujinti rankiniu būdu kartu (peer dependency: plugin-react 6 reikalauja Vite 8)
    ignore:
      - dependency-name: "vite"
      - dependency-name: "@vitejs/plugin-react"

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
